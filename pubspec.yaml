name: echovault
description: "EchoVault - The Ultimate Sound Experience."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.13
  chewie: ^1.7.5
  video_player: ^2.9.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.3
  device_info_plus: ^10.1.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  http: ^1.2.2
  # WebSocket & Real-time
  socket_io_client: ^2.0.2
  camera: ^0.10.5+9
  # Encryption for sensitive data
  flutter_secure_storage: ^9.0.0
  # State management & async
  async: ^2.11.0
  # Logging & debugging
  logger: ^2.0.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/Echo-Vault-Icon.png"
  adaptive_icon_background: "#9C27B0"
  adaptive_icon_foreground: "assets/Echo-Vault-Icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/Echo-Vault-Icon.png
    - assets/
