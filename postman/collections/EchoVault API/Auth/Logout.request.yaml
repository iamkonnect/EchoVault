$kind: http-request
name: Logout
method: POST
url: '{{baseUrl}}/api/auth/logout'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
