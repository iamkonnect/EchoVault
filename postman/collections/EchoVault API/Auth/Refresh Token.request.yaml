$kind: http-request
name: Refresh Token
method: POST
url: '{{baseUrl}}/api/auth/refresh'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      var json = pm.response.json();
      if (json.token) {
        pm.environment.set("authToken", json.token);
      }
