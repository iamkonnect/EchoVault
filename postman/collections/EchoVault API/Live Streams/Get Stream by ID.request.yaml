$kind: http-request
name: Get Stream by ID
method: GET
url: '{{baseUrl}}/api/live/streams/{{streamId}}'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
