$kind: http-request
name: Send Gift
method: POST
url: '{{baseUrl}}/api/gifting/send'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "recipientId": "{{userId}}",
      "giftId": "gift_001",
      "streamId": "{{streamId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
