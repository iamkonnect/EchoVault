$kind: http-request
name: Request Payout
method: POST
url: '{{baseUrl}}/api/user/request-payout'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "amount": 100,
      "method": "bank_transfer"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
