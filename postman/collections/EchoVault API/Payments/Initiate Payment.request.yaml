$kind: http-request
name: Initiate Payment
method: POST
url: '{{baseUrl}}/api/payments/initiate'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "packageId": "pkg_001",
      "paymentMethod": "card"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
