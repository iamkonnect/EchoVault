<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="EchoVault - The Ultimate Sound Experience.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  
  <!-- Permissions Policy: Allow camera and microphone for live streaming -->
  <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self)">

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EchoVault">
  
  <!-- iOS meta tags & icons -->
  <link rel="apple-touch-icon" href="icons/Echo-Vault-Icon.png">
  <link rel="apple-touch-startup-image" href="icons/Echo-Vault-Icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>EchoVault</title>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service_worker.js').then(function(registration) {
          console.log('Service Worker registered:', registration);
        }).catch(function(error) {
          console.log('Service Worker registration failed:', error);
        });
      });
    }

    // Handle updates to service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        console.log('Service Worker controller changed - app updated');
        // Optionally show update notification
        window.location.reload();
      });
    }
  </script>

  <!-- Camera and Microphone Permission Script -->
  <script>
    window.addEventListener('load', function() {
      console.log('EchoVault loaded - ready for camera/microphone access');
      
      // Check if app can be installed
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('Install prompt available');
      });
    });
  </script>
</body>
</html>
